<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رائد الأسبوعي | Raed Mohammed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,600;1,500&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Markazi+Text:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F6EFE2;
    --bg-deep: #EDE2CC;
    --surface: #FDFAF3;
    --ink: #2B2420;
    --ink-soft: #6B5D4F;
    --brass: #A9793C;
    --brass-light: #C79A5D;
    --oxblood: #6E2A2A;
    --line: #E1D3B8;
    --shadow: 0 10px 30px -12px rgba(43,36,32,0.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(circle at 15% 0%, #F9F2E4 0%, var(--bg) 45%, var(--bg-deep) 100%);
    color: var(--ink);
    font-family:'IBM Plex Sans Arabic', sans-serif;
    min-height:100vh;
    padding: 28px 18px 60px;
  }
  .wrap{max-width:920px;margin:0 auto;}

  /* header */
  header{
    display:flex; justify-content:space-between; align-items:flex-end;
    gap:20px; flex-wrap:wrap;
    border-bottom: 1px solid var(--line);
    padding-bottom: 22px; margin-bottom: 30px;
  }
  .brand{display:flex; flex-direction:column; gap:4px;}
  .brand .en{
    font-family:'Fraunces', serif; font-style:italic; font-weight:500;
    color: var(--oxblood); font-size: 14px; letter-spacing:0.5px;
    direction:ltr; text-align:right;
  }
  .brand .ar{
    font-family:'Markazi Text', serif; font-weight:700;
    font-size: 34px; color: var(--ink); line-height:1;
  }
  .brand .tag{ color:var(--ink-soft); font-size:13px; margin-top:2px;}

  .gen-btn{
    background: linear-gradient(135deg, var(--brass), var(--oxblood));
    color:#FDFAF3; border:none; border-radius: 999px;
    padding: 14px 28px; font-family:'IBM Plex Sans Arabic'; font-weight:600;
    font-size:15px; cursor:pointer; box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .gen-btn:hover{ transform: translateY(-2px); }
  .gen-btn:disabled{ opacity:.6; cursor:wait; transform:none;}

  .status-line{ font-size:13px; color: var(--ink-soft); margin-top:8px;}

  /* trend banner */
  .trend{
    display:none;
    background: var(--surface); border: 1px solid var(--line);
    border-right: 4px solid var(--brass);
    border-radius: 14px; padding: 16px 18px; margin-bottom: 26px;
    box-shadow: var(--shadow);
  }
  .trend.show{display:block;}
  .trend .label{ font-size:12px; color:var(--oxblood); font-weight:700; letter-spacing:.5px;}
  .trend p{margin:6px 0 0; font-size:14px; line-height:1.9; color:var(--ink);}

  /* day cards */
  .timeline{ position:relative; }
  .day-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    margin-bottom: 22px;
    box-shadow: var(--shadow);
    overflow:hidden;
    display:grid;
    grid-template-columns: 1fr 260px;
  }
  @media (max-width: 760px){
    .day-card{ grid-template-columns: 1fr; }
  }
  .day-copy{ padding: 26px 28px; }
  .day-head{ display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .day-num{
    font-family:'Markazi Text', serif; font-weight:700; font-size:22px;
    color: var(--brass); border:1.5px solid var(--brass-light);
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .day-name{ font-family:'Markazi Text', serif; font-weight:700; font-size:22px;}
  .day-cat{
    font-size:11.5px; color: var(--oxblood); background:#F3E4D8;
    padding:4px 10px; border-radius:999px; font-weight:600;
    margin-inline-start:auto;
  }
  .hook{ font-weight:600; font-size:15.5px; margin-bottom:8px; color:var(--ink);}
  .post-text{
    white-space:pre-wrap; font-size:14.5px; line-height:2; color: var(--ink);
    background:#FBF6EB; border:1px dashed var(--line); border-radius:12px;
    padding:14px 16px; margin-bottom:10px;
  }
  .hashtags{ font-size:12.5px; color: var(--brass); direction:ltr; text-align:right; margin-bottom:14px;}
  .copy-btn{
    background:none; border:1.4px solid var(--ink); color:var(--ink);
    border-radius:999px; padding:8px 18px; font-size:13px; cursor:pointer;
    font-family:'IBM Plex Sans Arabic'; font-weight:600;
    transition: background .15s ease, color .15s ease;
  }
  .copy-btn:hover{ background:var(--ink); color:var(--surface);}
  .copy-btn.copied{ background:var(--oxblood); color:#fff; border-color:var(--oxblood);}

  .day-visual{
    background: var(--bg-deep);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; padding:18px;
    border-inline-start: 1px solid var(--line);
  }
  @media (max-width:760px){ .day-visual{ border-inline-start:none; border-top:1px solid var(--line);} }
  canvas{ width:100%; max-width:210px; border-radius:12px; box-shadow: var(--shadow); }
  .dl-btn{
    background:var(--surface); border:1.4px solid var(--brass);
    color:var(--oxblood); border-radius:999px; padding:7px 16px;
    font-size:12.5px; cursor:pointer; font-family:'IBM Plex Sans Arabic'; font-weight:600;
  }
  .dl-btn:hover{ background:var(--brass); color:#fff;}

  .empty{
    text-align:center; padding: 70px 20px; color: var(--ink-soft);
  }
  .empty .big{ font-family:'Markazi Text', serif; font-size:26px; color:var(--ink); margin-bottom:10px;}

  .history{ margin-top:40px; }
  .history h3{ font-family:'Markazi Text', serif; font-size:20px; color:var(--ink-soft); margin-bottom:10px;}
  #historyList{ max-height: 420px; overflow-y: auto; padding-inline-end: 4px; }
  .hist-item{
    font-size:13px; color:var(--ink-soft); background:var(--surface);
    border:1px solid var(--line); border-radius:10px; padding:9px 14px;
    margin-bottom:8px; cursor:pointer; display:flex; justify-content:space-between;
  }
  .hist-item:hover{ border-color:var(--brass); color:var(--ink);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="en">Raed Mohammed | Performance Marketing</span>
      <span class="ar">منشورات رائد الأسبوعية</span>
      <span class="tag">إعلانات فيديو · صناعة محتوى · صفحات هبوط</span>
    </div>
    <div style="text-align:left;">
      <button class="gen-btn" id="genBtn">ولّد منشورات هالأسبوع</button>
      <div class="status-line" id="statusLine"></div>
    </div>
  </header>

  <div class="trend" id="trendBox">
    <div class="label">تحديث المنصات هالأسبوع</div>
    <p id="trendText"></p>
  </div>

  <div class="timeline" id="timeline">
    <div class="empty" id="emptyState">
      <div class="big">جاهز تسوي محتوى الأسبوع؟</div>
      <div>اضغط "ولّد منشورات هالأسبوع" وبجهز لك 7 منشورات مع تصاميم — كل يوم له فكرة وصورة جاهزة للنسخ.</div>
    </div>
  </div>

  <div class="history" id="historyBox" style="display:none;">
    <h3>أسابيع سابقة</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
const DAYS_AR = ["السبت","الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة"];
const BRAND_NAME = "Raed Mohammed";
const BRAND_TAG = "Performance Marketing";

// 👇 حط هنا رابط الـ Worker اللي بتحصل عليه بعد خطوات النشر (شوف التعليمات)
// مثال: "https://raed-content.your-name.workers.dev"
const PROXY_URL = "https://lingering-unit-739f.raidmohamed12345.workers.dev/";

const genBtn = document.getElementById('genBtn');
const statusLine = document.getElementById('statusLine');
const timeline = document.getElementById('timeline');
const emptyState = document.getElementById('emptyState');
const trendBox = document.getElementById('trendBox');
const trendText = document.getElementById('trendText');
const historyBox = document.getElementById('historyBox');
const historyList = document.getElementById('historyList');

function weekKey(date){
  const d = new Date(date);
  return 'week:' + d.toISOString().slice(0,10);
}

function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight){
  const words = text.split(' ');
  let line = '';
  const lines = [];
  for(let w of words){
    const test = line ? line + ' ' + w : w;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if(line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i*lineHeight));
  return lines.length;
}

function drawCard(canvas, category, headline, subtext){
  const ctx = canvas.getContext('2d');
  const W = 600, H = 600;
  canvas.width = W; canvas.height = H;

  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0, '#F9F2E4');
  grad.addColorStop(1, '#EDE0C8');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // brass corner line
  ctx.strokeStyle = '#A9793C';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(50, 60); ctx.lineTo(120, 60);
  ctx.stroke();

  // category tag
  ctx.fillStyle = '#6E2A2A';
  ctx.font = '600 18px "IBM Plex Sans Arabic", sans-serif';
  ctx.textAlign = 'right';
  ctx.direction = 'rtl';
  ctx.fillText(category, W-50, 70);

  // headline
  ctx.fillStyle = '#2B2420';
  ctx.font = '700 42px "Markazi Text", serif';
  ctx.textAlign = 'right';
  const usedLines = wrapCanvasText(ctx, headline, W-50, 220, W-100, 52);

  // subtext
  ctx.fillStyle = '#6B5D4F';
  ctx.font = '400 20px "IBM Plex Sans Arabic", sans-serif';
  wrapCanvasText(ctx, subtext, W-50, 220 + usedLines*52 + 40, W-100, 32);

  // footer brand
  ctx.strokeStyle = '#E1D3B8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(50, H-90); ctx.lineTo(W-50, H-90);
  ctx.stroke();

  ctx.fillStyle = '#A9793C';
  ctx.font = 'italic 500 20px "Fraunces", serif';
  ctx.textAlign = 'left';
  ctx.direction = 'ltr';
  ctx.fillText(BRAND_NAME, 50, H-55);

  ctx.fillStyle = '#6B5D4F';
  ctx.font = '400 14px "IBM Plex Sans Arabic", sans-serif';
  ctx.fillText(BRAND_TAG, 50, H-32);
}

function renderPosts(data, keyLabel){
  emptyState.style.display = 'none';
  timeline.innerHTML = '';

  if(data.weekly_theme){
    trendBox.classList.add('show');
    trendText.textContent = data.weekly_theme;
  } else {
    trendBox.classList.remove('show');
  }

  data.posts.forEach((post, idx) => {
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-copy">
        <div class="day-head">
          <div class="day-num">${idx+1}</div>
          <div class="day-name">${post.day_name || DAYS_AR[idx]}</div>
          <div class="day-cat">${post.category || ''}</div>
        </div>
        <div class="hook">${post.hook || ''}</div>
        <div class="post-text">${(post.post_text || '').trim()}</div>
        <div class="hashtags">${(post.hashtags || []).join(' ')}</div>
        <button class="copy-btn">نسخ المنشور</button>
      </div>
      <div class="day-visual">
        <canvas></canvas>
        <button class="dl-btn">تنزيل الصورة</button>
      </div>
    `;
    timeline.appendChild(card);

    const canvas = card.querySelector('canvas');
    drawCard(canvas, post.category || '', post.image_headline || post.hook || '', post.image_subtext || '');

    card.querySelector('.copy-btn').addEventListener('click', (e) => {
      const fullText = (post.post_text || '').trim() + '\n\n' + (post.hashtags || []).join(' ');
      navigator.clipboard.writeText(fullText).then(() => {
        e.target.textContent = 'اتنسخ ✓';
        e.target.classList.add('copied');
        setTimeout(() => { e.target.textContent = 'نسخ المنشور'; e.target.classList.remove('copied'); }, 1800);
      });
    });

    card.querySelector('.dl-btn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `raed-post-day${idx+1}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  });
}

async function loadHistory(){
  try{
    const res = await window.storage.list('week:');
    if(res && res.keys && res.keys.length){
      historyBox.style.display = 'block';
      historyList.innerHTML = '';
      const sorted = res.keys.sort().reverse();
      for(const k of sorted.slice(0,100)){
        const item = document.createElement('div');
        item.className = 'hist-item';
        item.innerHTML = `<span>أسبوع ${k.replace('week:','')}</span><span>فتح ↺</span>`;
        item.addEventListener('click', async () => {
          try{
            const r = await window.storage.get(k);
            if(r && r.value){
              renderPosts(JSON.parse(r.value));
              timeline.scrollIntoView({ behavior: 'smooth', block: 'start' });
              statusLine.textContent = 'تم فتح أسبوع ' + k.replace('week:', '');
            }
          } catch(e){
            statusLine.textContent = 'تعذر فتح هذا الأسبوع';
          }
        });
        historyList.appendChild(item);
      }
    }
  } catch(e){ /* no history yet */ }
}

async function generateWeek(){
  genBtn.disabled = true;
  statusLine.textContent = 'يتفقد تحديثات ميتا وتيك توك، ويجهز الأفكار...';

  const systemPrompt = `أنت مساعد تسويق متخصص لشخص اسمه Raed Mohammed، خبير في: إعلانات فيديو مدفوعة (Paid Video Ads)، صناعة محتوى (Content Creation)، وبناء صفحات هبوط (Landing Pages) للسوق السعودي.

مهمتك: أولاً ابحث بأداة البحث عن أي تحديثات أو تغييرات مهمة صدرت خلال آخر 10-14 يوم من ميتا (فيسبوك/انستغرام) أو تيك توك تخص الإعلانات، الخوارزمية، أو صناعة المحتوى. إذا وجدت تحديث مهم وحقيقي، اجعله "موضوع الأسبوع" وخصص له منشور واحد على الأقل من السبعة. إذا ما وجدت شيء مهم فعلاً، اترك weekly_theme فارغ (null) ولا تختلق شيء.

بعد البحث، أنشئ خطة محتوى لـ 7 أيام (تبدأ السبت) لحساب شخصي على انستغرام/تويتر/فيسبوك، يقدم نصائح وقيمة حقيقية في: إعلانات الفيديو المدفوعة، صناعة المحتوى، وصفحات الهبوط، بالتناوب بين نصيحة عملية، حل مشكلة شائعة، خطأ يتجنبه المعلن، أو ملاحظة عامة عن التسويق الرقمي.

اكتب كل نص منشور بلهجة سعودية/خليجية طبيعية دافئة، احترافية بدون تكلف، جاهز للنسخ مباشرة (بدون هاشتاقات داخل النص، الهاشتاقات منفصلة). كل منشور بين 60-120 كلمة تقريباً، بأسلوب يبني ثقة (مو بيع مباشر).

مهم جداً: ردّك الأخير يجب يكون JSON فقط بدون أي نص قبله أو بعده أو علامات ماركداون، بهذا الشكل بالضبط:
{
  "weekly_theme": "جملة أو جملتين عن التحديث المهم إذا وجد، أو null",
  "posts": [
    {
      "day_name": "السبت",
      "category": "إعلانات فيديو",
      "hook": "جملة افتتاحية قوية وقصيرة",
      "post_text": "نص المنشور الكامل بالعربي الخليجي",
      "hashtags": ["#تسويق_رقمي", "#اعلانات_فيديو"],
      "image_headline": "عبارة قصيرة جداً (٣-٦ كلمات) للصورة",
      "image_subtext": "جملة فرعية قصيرة تكمل العبارة"
    }
  ]
}
يجب أن تحتوي مصفوفة posts على 7 عناصر بالضبط، بالترتيب: السبت، الأحد، الاثنين، الثلاثاء، الأربعاء، الخميس، الجمعة.`;

  try{
    if(PROXY_URL === "PASTE_YOUR_WORKER_URL_HERE"){
      throw new Error('لسا ما حطيت رابط السيرفر (PROXY_URL) بأعلى الكود');
    }

    const response = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [
          { role: "user", parts: [{ text: "جهز محتوى هالأسبوع. سوّي بحث سريع مختصر ثم أعطني JSON فقط." }] }
        ],
        tools: [{ google_search: {} }],
        generationConfig: { maxOutputTokens: 4096 }
      })
    });

    const data = await response.json();

    if(!response.ok || data.error){
      throw new Error((data.error && data.error.message) || `فشل الطلب (${response.status})`);
    }

    const candidate = (data.candidates || [])[0];
    if(!candidate){
      throw new Error('ما رجع أي رد من النموذج، جرب مرة ثانية');
    }
    if(candidate.finishReason === 'MAX_TOKENS'){
      console.warn('Response was cut off at max tokens');
    }

    const textBlocks = ((candidate.content && candidate.content.parts) || [])
      .filter(p => p.text)
      .map(p => p.text)
      .join('\n');

    if(!textBlocks.trim()) throw new Error('ما رجع أي نص من النموذج، جرب مرة ثانية');

    let clean = textBlocks.trim();
    const jsonStart = clean.indexOf('{');
    const jsonEnd = clean.lastIndexOf('}');
    if(jsonStart === -1 || jsonEnd === -1) throw new Error('الرد ما كان JSON صالح');
    clean = clean.slice(jsonStart, jsonEnd + 1);

    let parsed;
    try{
      parsed = JSON.parse(clean);
    } catch(parseErr){
      throw new Error('تعذر قراءة المحتوى، الرد ممكن يكون انقطع. جرب مرة ثانية');
    }

    if(!parsed.posts || parsed.posts.length === 0) throw new Error('لا يوجد محتوى بالرد');

    renderPosts(parsed);

    const key = weekKey(new Date());
    try{ await window.storage.set(key, JSON.stringify(parsed)); } catch(e){}
    await loadHistory();

    statusLine.textContent = 'جاهز! هذا محتوى الأسبوع.';
  } catch(err){
    console.error(err);
    statusLine.textContent = 'صار خطأ: ' + (err.message || 'جرب مرة ثانية');
  } finally {
    genBtn.disabled = false;
  }
}

genBtn.addEventListener('click', generateWeek);
loadHistory();
</script>
</body>
</html>
